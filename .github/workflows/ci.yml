name: CI

on:
  push:
    branches: ['*']

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: '10'
      - run: npm install --ignore-scripts
      - name: Run tests
        run: node -e "Promise.defer = function() { var d = {}; d.promise = new Promise(function(r, j) { d.resolve = r; d.reject = j; }); return d; }; require('jest-cli/bin/jest')"
